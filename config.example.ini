[auth]
; 校园网认证页地址。断网后打开这个地址应进入登录页面。
url=https://example.edu/login

[probe]
; 用逗号分隔。只要任意一个探测地址成功，就认为网络正常。
; 如果学校网络拦截了这些地址，可以换成你常用且稳定可访问的网址。
urls=https://www.baidu.com/,https://www.msftconnecttest.com/connecttest.txt,https://www.gstatic.com/generate_204
timeout_ms=3000

[ui]
; 登录按钮截图路径。相对路径按脚本所在目录计算。
button_image=signin_button.png
; 打开认证页后等待页面加载的时间。
page_wait_ms=10000
; 点击按钮后等待认证完成的时间。
after_click_wait_ms=5000
; ImageSearch 容错值，越大越宽松。常用 20-60。
image_variation=35

[guard]
; 认证尝试冷却时间，避免失败时频繁弹窗。
cooldown_seconds=120

