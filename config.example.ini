[portal]
portal_url=https://p.njupt.edu.cn/a79.htm
; Portal server IP. Use IP instead of domain to avoid browser/proxy/fake-IP DNS.
server_ip=10.10.244.11
portal_port=801
account_suffix=@cmcc
; Dr.COM portal usually sends ,0,user@cmcc from the PC login page.
account_prefix=,0,

[network]
; Leave empty for auto detection. Set it if auto detection picks a VPN/TUN adapter.
interface_alias=
wlan_user_ip=
wlan_user_mac=

[schedule]
; Windows Task Scheduler interval.
check_interval_minutes=1

[guard]
timeout_seconds=5
; Require two consecutive offline checks before sending one login request.
offline_confirmations=2
; After a failed login, wait before trying again.
cooldown_seconds=300

[logging]
; Normal online checks do not need one log line per minute.
online_heartbeat_minutes=360
; Rotate current log when it grows beyond this size.
max_log_bytes=65536
; Delete rotated logs older than this many days.
retention_days=3
; Keep at most this many rotated logs.
max_archives=3
